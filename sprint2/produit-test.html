<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
  <title>Gondor Chic</title>

  <style>
    /* Conteneur principal style parchemin */
    .gondor-container {
      background: url('background.png') 0 0 / 100% 100% no-repeat;
      padding: 40px;
      font-family: 'Uncial Antiqua', Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* En-tête */
    .gondor-header {
      text-align: center;
      margin-bottom: 30px;
      width: 100%;
    }

    .gondor-logo {
      height: 80px;
      width: auto;
      margin-bottom: 10px;
      opacity: 0.9;
      filter: invert(48%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(92%) contrast(88%);
    }

    .brand-title {
      font-size: 2.8rem;
      color: #21130d;
      margin: 0;
      text-transform: capitalize;
      letter-spacing: 1px;
    }

    .welcome-text {
      font-size: 1.4rem;
      color: #3d2c1f;
      margin: 5px 0 0 0;
      border-top: 1px solid #7d5c38;
      display: inline-block;
      padding-top: 12px;
      width: 60%;
    }

    .welcome {
      color: #916F25;
    }

    /* Cadre Produit */
    .product-card {
      border: 2px solid #5a4128;
      border-radius: 4px;
      padding: 25px;
      position: relative;
      background-color: rgba(50, 30, 14, 0.262);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 900px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    /* Badge Produit du jour */
    .badge-produit-jour {
      position: absolute;
      top: -15px;
      left: 20px;
      background-color: #ffd27d;
      border: 2px solid #5a4128;
      border-radius: 20px;
      padding: 5px 20px;
      font-weight: bold;
      font-size: 1rem;
      color: #21130d;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
    }

    /* Alignement interne du cadre */
    .product-content {
      display: flex;
      gap: 30px;
      margin-top: 10px;
    }

    /* Section Image */
    .product-image-container {
      flex: 1;
      border: 3px double #5a4128;
      border-radius: 4px;
      padding: 5px;
      background-color: #000;
      max-width: 400px;
      height: 350px;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px;
    }

    /* Section Détails Droite */
    .product-details {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-name {
      font-size: 1.5rem;
      color: #311c11;
      margin: 0 0 20px 0;
      font-weight: normal;
    }

    /* Ligne Prix / Stock */
    .info-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .info-box {
      flex: 1;
      border: 2px solid #7d5c38;
      background-color: rgba(255, 255, 255, 0.4);
      border-radius: 4px;
      padding: 10px;
      text-align: center;
    }

    .box-label {
      display: block;
      font-size: 0.95rem;
      font-weight: bold;
      color: #4a3423;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .box-value {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    .price-value {
      color: #8c673b;
      font-family: 'Georgia', serif;
    }

    .coin-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-block;
    }

    .stock-value {
      color: #0c823d;
      font-family: 'Georgia', serif;
    }

    .checkmark-icon {
      background-color: #0c823d;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }

    /* Section Quantité */
    .quantity-section {
      border: 2px solid #7d5c38;
      background-color: rgba(255, 255, 255, 0.4);
      border-radius: 4px;
      padding: 12px 15px;
      margin-bottom: 25px;
    }

    .quantity-selector {
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid #7d5c38;
      border-radius: 4px;
      background-color: #fff;
      width: 140px;
      overflow: hidden;
    }

    .qty-btn {
      background-color: #d1b48c;
      border: none;
      width: 35px;
      height: 35px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #311c11;
      cursor: pointer;
      transition: background 0.2s;
    }

    .qty-btn:hover {
      background-color: #bfa076;
    }

    .qty-input {
      width: 70px;
      height: 35px;
      border: none;
      border-left: 1px solid #7d5c38;
      border-right: 1px solid #7d5c38;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #311c11;
      -moz-appearance: textfield;
    }

    .qty-input::-webkit-outer-spin-button,
    .qty-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Bouton Ajouter au Panier */
    .btn-add-to-cart {
      width: 100%;
      height: 55px;
      background-image: url('fond_bt_ajout_panier.png');
      background-size: cover;
      background-position: center;
      background-color: #1a3020;
      border: 1px solid #0d1a11;
      border-radius: 4px;
      color: #ffffff;
      font-size: 1.2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: transform 0.1s, filter 0.2s;
    }

    .btn-add-to-cart:hover {
      filter: brightness(1.1);
    }

    .btn-add-to-cart:active {
      transform: scale(0.99);
    }
  </style>
</head>

<body>

<div class="gondor-container">

  <!-- En-tête avec logo et marque -->
  <header class="gondor-header">
    <img src="logo-login.svg" alt="Logo Gondor Chic" class="gondor-logo">

    <h1 class="brand-title">Gondor Chic</h1>

    <h2 class="welcome-text">
      <span class="welcome">Bienvenue,</span>
      Aragorn Elessar
    </h2>
  </header>

  <!-- Cadre principal du produit -->
  <main class="product-card">

    <div class="badge-produit-jour">
      Le produit du jour
    </div>

    <div class="product-content">

      <!-- Section Gauche : Image du produit -->
      <div class="product-image-container">
        <img
          src="produit_jour.png"
          alt="Pèlerine de Maillon d'Argent"
          class="product-image"
        >
      </div>

      <!-- Section Droite : Infos et actions -->
      <div class="product-details">

        <h3 class="product-name">
          Pèlerine de Maillon d'Argent
        </h3>

        <!-- Ligne Prix et Stock -->
        <div class="info-row">

          <div class="info-box">
            <span class="box-label">Prix</span>

            <div class="box-value price-value">
              <img src="piece.png" alt="Pièce" class="coin-icon">
              <span>50€</span>
            </div>
          </div>

          <div class="info-box">
            <span class="box-label">En stock</span>

            <div class="box-value stock-value">
              <span class="checkmark-icon">✓</span>
              <span>10 PIÈCE</span>
            </div>
          </div>

        </div>

        <!-- Section Quantité -->
        <div class="quantity-section">

          <span class="box-label">Quantité</span>

          <div class="quantity-selector">

            <button type="button" class="qty-btn" id="btn-minus">
              -
            </button>

            <input
              type="number"
              class="qty-input"
              id="qty-input"
              value="1"
            >

            <button type="button" class="qty-btn" id="btn-plus">
              +
            </button>

          </div>
        </div>

        <!-- Bouton Ajouter au panier -->
        <button type="button" class="btn-add-to-cart">
          Ajouter au panier
        </button>

      </div>
    </div>
  </main>
</div>

<script>
  let quantite = 1;
  const maxStock = 10;

  const qtyInput = document.getElementById("qty-input");
  const btnPlus = document.getElementById("btn-plus");
  const btnMinus = document.getElementById("btn-minus");

  function mettreAJourAffichage() {
    qtyInput.value = quantite;
  }

  function incrementer() {
    if (quantite < maxStock) {
      quantite++;
      mettreAJourAffichage();
    }
  }

  function decrementer() {
    if (quantite > 1) {
      quantite--;
      mettreAJourAffichage();
    }
  }

  function validerSaisie() {
    const valeur = parseInt(qtyInput.value, 10);

    if (isNaN(valeur) || valeur < 1) {
      quantite = 1;
    } else if (valeur > maxStock) {
      quantite = maxStock;
    } else {
      quantite = valeur;
    }

    mettreAJourAffichage();
  }

  btnPlus.addEventListener("click", incrementer);
  btnMinus.addEventListener("click", decrementer);
  qtyInput.addEventListener("input", validerSaisie);
</script>

</body>
</html>
